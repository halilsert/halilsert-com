<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
    <!-- Base background -->
    <rect width="600" height="900" fill="#121418"/>
    <!-- Border/Frame -->
    <rect x="20" y="20" width="560" height="860" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.5"/>
    <rect x="30" y="30" width="540" height="840" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
    
    <!-- Abstract layers/graphics -->
    <path d="M 0 450 Q 150 400 300 450 T 600 450 L 600 900 L 0 900 Z" fill="#090a0c" opacity="0.8"/>
    <circle cx="300" cy="450" r="150" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.2"/>
    <circle cx="300" cy="450" r="100" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
    
    <!-- Text -->
    <text x="300" y="200" font-family="serif" font-size="20" fill="#8b8e94" text-anchor="middle" letter-spacing="4">HALİL SERT</text>
    <text x="300" y="350" font-family="serif" font-size="50" font-weight="bold" fill="#d4af37" text-anchor="middle" letter-spacing="6">YEDİNCİ</text>
    <text x="300" y="420" font-family="serif" font-size="50" font-weight="bold" fill="#d4af37" text-anchor="middle" letter-spacing="6">KATMAN</text>
    
    <text x="300" y="700" font-family="sans-serif" font-size="14" fill="#8b8e94" text-anchor="middle" opacity="0.7">Kudüs'ün Görünmeyen Tarihi,</text>
    <text x="300" y="730" font-family="sans-serif" font-size="14" fill="#8b8e94" text-anchor="middle" opacity="0.7">İnançları ve Jeopolitik Dokusu</text>
    
    <!-- Info Note -->
    <rect x="100" y="800" width="400" height="40" fill="#d4af37" opacity="0.1" rx="4"/>
    <text x="300" y="825" font-family="sans-serif" font-size="12" fill="#d4af37" text-anchor="middle">[ BURAYA KİTAP KAPAĞINIZI (cover.jpg/png) EKLEYİN ]</text>
